<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BoardCam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f6;
  --toolbar-bg: #ffffffee;
  --toolbar-border: #e8e6e1;
  --icon-default: #6b6860;
  --icon-active: #1a1916;
  --accent: #e8453c;
  --accent-soft: #fff0ef;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --font: 'DM Sans', -apple-system, sans-serif;
}
html, body {
  height: 100%; width: 100%; overflow: hidden;
  font-family: var(--font); background: var(--bg);
  -webkit-user-select: none; user-select: none;
}

/* === CANVAS === */
#drawCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  cursor: crosshair; background: var(--bg);
  background-image: radial-gradient(circle, #ddd9d0 0.7px, transparent 0.7px);
  background-size: 24px 24px;
  touch-action: none;
}

/* === TOP TOOLBAR (drawing tools) === */
#topBar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 1px; padding: 8px 8px; z-index: 100;
  padding-top: max(8px, env(safe-area-inset-top));
  background: linear-gradient(to bottom, rgba(248,248,246,0.95) 70%, transparent);
  pointer-events: none;
}
#topBar > * { pointer-events: auto; }
.tb {
  display: flex; align-items: center; gap: 1px;
  background: var(--toolbar-bg); border: 1px solid var(--toolbar-border);
  border-radius: 10px; padding: 3px 4px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow-md);
}
.tool-btn {
  width: 38px; height: 38px; border: none; background: transparent;
  border-radius: 8px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--icon-default); transition: all 0.15s;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.tool-btn:active, .tool-btn.active { background: #edecea; color: var(--icon-active); }
.tool-btn svg { width: 20px; height: 20px; pointer-events: none; }
.tool-sep { width: 1px; height: 20px; background: var(--toolbar-border); margin: 0 2px; flex-shrink: 0; }

/* === BOTTOM BAR (colors, stroke, record) === */
#bottomBar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(248,248,246,0.95) 70%, transparent);
  z-index: 100; pointer-events: none;
}
#bottomBar > * { pointer-events: auto; }
.bb {
  display: flex; align-items: center; gap: 3px;
  background: var(--toolbar-bg); border: 1px solid var(--toolbar-border);
  border-radius: 10px; padding: 4px 6px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow-md);
}

/* Colors */
.color-dot {
  width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid transparent;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.color-dot.active { border-color: var(--icon-active); box-shadow: 0 0 0 2px #fff; }

/* Stroke width */
.stroke-opt {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: transparent; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.stroke-opt.active { background: #edecea; }
.stroke-dot { border-radius: 50%; background: var(--icon-default); }

/* Record button */
#recordBtn {
  width: 42px; height: 42px; border: none; border-radius: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft); transition: all 0.2s; color: var(--accent);
  -webkit-tap-highlight-color: transparent;
}
#recordBtn.recording { background: var(--accent); color: #fff; animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(232,69,60,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(232,69,60,0); }
}

/* Record timer */
#recordTimer {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7); color: #fff; padding: 6px 18px;
  border-radius: 24px; font-size: 15px; font-weight: 500;
  letter-spacing: 1px; z-index: 200; display: none;
  backdrop-filter: blur(8px);
}
#recordTimer.visible { display: flex; align-items: center; gap: 8px; }
#recordTimer::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); animation: blink 1s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* === CAMERA PIP === */
#cameraPip {
  position: fixed; bottom: 80px; right: 16px; width: 80px; height: 80px;
  border-radius: 50%; overflow: hidden; z-index: 90;
  box-shadow: var(--shadow-lg), 0 0 0 3px #fff;
  touch-action: none;
}
#cameraPip video {
  width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
  background: #000;
}
#cameraOff {
  position: absolute; inset: 0; background: #2a2a28;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #aaa; font-size: 10px; gap: 4px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#cameraOff svg { width: 20px; height: 20px; opacity: 0.6; }

/* === UNDO/REDO === */
#undoRedo {
  position: fixed; top: 50%; right: 10px; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 4px; z-index: 90;
}
#undoRedo button {
  width: 38px; height: 38px; border: 1px solid var(--toolbar-border);
  background: var(--toolbar-bg); border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--icon-default); box-shadow: var(--shadow-sm);
  backdrop-filter: blur(12px); -webkit-tap-highlight-color: transparent;
}
#undoRedo button:disabled { opacity: 0.25; }
#undoRedo button svg { width: 18px; height: 18px; pointer-events: none; }

/* === TEXT INPUT === */
#textInput {
  position: fixed; z-index: 110; border: 2px solid var(--accent);
  border-radius: 6px; padding: 6px 10px; font-family: var(--font);
  font-size: 20px; background: #fff; outline: none; min-width: 120px;
  display: none; box-shadow: var(--shadow-md);
}

/* === CLEAR BUTTON === */
#clearBtn {
  position: fixed; top: 50%; left: 10px; transform: translateY(-50%);
  width: 38px; height: 38px; border: 1px solid var(--toolbar-border);
  background: var(--toolbar-bg); border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--icon-default); box-shadow: var(--shadow-sm);
  backdrop-filter: blur(12px); z-index: 90;
  -webkit-tap-highlight-color: transparent;
}
#clearBtn svg { width: 18px; height: 18px; pointer-events: none; }
</style>
</head>
<body>

<!-- TOP TOOLBAR: Drawing tools -->
<div id="topBar"></div>

<!-- RECORD TIMER -->
<div id="recordTimer"><span id="timerText">00:00</span></div>

<!-- CANVAS -->
<canvas id="drawCanvas"></canvas>

<!-- TEXT INPUT -->
<input type="text" id="textInput" placeholder="输入文字...">

<!-- CAMERA PIP -->
<div id="cameraPip">
  <video id="cameraVideo" autoplay playsinline muted></video>
  <div id="cameraOff">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    <span>点击开启</span>
  </div>
</div>

<!-- UNDO/REDO -->
<div id="undoRedo">
  <button id="undoBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 0 1 15.36-6.36L21 9"/></svg>
  </button>
  <button id="redoBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M21 13a9 9 0 0 0-15.36-6.36L3 9"/></svg>
  </button>
</div>

<!-- CLEAR BUTTON -->
<button id="clearBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>
</button>

<!-- BOTTOM BAR: Colors, stroke, record -->
<div id="bottomBar"></div>

<script>
// ========================================
// BoardCam - Mobile-First Whiteboard App
// ========================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// --- STATE ---
let currentTool = 'pen';
let currentColor = '#1a1916';
let currentStroke = 3;
let strokes = [];
let drawHistory = [];
let historyIndex = -1;
let isDrawing = false;
let currentPoints = [];
let shapeStart = null;
let panOffset = { x: 0, y: 0 };
let panStart = null;
let cameraReady = false;

const colors = ['#1a1916','#e8453c','#3b82f6','#16a34a','#f59e0b','#8b5cf6'];
const strokeWidths = [2, 5, 10];

// --- BUILD TOP TOOLBAR ---
const topTools = [
  { id: 'pen', icon: '<path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>' },
  { id: 'line', icon: '<line x1="4" y1="20" x2="20" y2="4"/>' },
  { id: 'arrow', icon: '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>' },
  { id: 'sep' },
  { id: 'rect', icon: '<rect x="3" y="3" width="18" height="18" rx="2"/>' },
  { id: 'ellipse', icon: '<circle cx="12" cy="12" r="10"/>' },
  { id: 'diamond', icon: '<path d="M12 2l10 10-10 10L2 12z"/>' },
  { id: 'sep' },
  { id: 'text', icon: '<path d="M6 4h12"/><path d="M12 4v16"/><path d="M8 20h8"/>' },
  { id: 'eraser', icon: '<path d="M20 20H7L3 16l9-9 8 8-4 4"/><path d="M6.5 13.5l5-5"/>' },
];

(function buildTopBar() {
  const bar = $('#topBar');
  const tb = document.createElement('div');
  tb.className = 'tb';
  topTools.forEach(t => {
    if (t.id === 'sep') {
      tb.insertAdjacentHTML('beforeend', '<div class="tool-sep"></div>');
      return;
    }
    const btn = document.createElement('button');
    btn.className = 'tool-btn' + (t.id === currentTool ? ' active' : '');
    btn.dataset.tool = t.id;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${t.icon}</svg>`;
    btn.addEventListener('click', () => {
      currentTool = t.id;
      $$('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === t.id));
    });
    tb.appendChild(btn);
  });
  bar.appendChild(tb);
})();

// --- BUILD BOTTOM BAR ---
(function buildBottomBar() {
  const bar = $('#bottomBar');

  // Colors
  const colorsDiv = document.createElement('div');
  colorsDiv.className = 'bb';
  colors.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (i === 0 ? ' active' : '');
    dot.style.background = c;
    dot.dataset.color = c;
    dot.addEventListener('click', () => {
      $$('.color-dot').forEach(x => x.classList.remove('active'));
      dot.classList.add('active');
      currentColor = c;
    });
    colorsDiv.appendChild(dot);
  });
  bar.appendChild(colorsDiv);

  // Stroke widths
  const strokeDiv = document.createElement('div');
  strokeDiv.className = 'bb';
  strokeWidths.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'stroke-opt' + (i === 0 ? ' active' : '');
    btn.dataset.width = w;
    btn.innerHTML = `<div class="stroke-dot" style="width:${w + 4}px;height:${w + 4}px"></div>`;
    btn.addEventListener('click', () => {
      $$('.stroke-opt').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      currentStroke = w;
    });
    strokeDiv.appendChild(btn);
  });
  bar.appendChild(strokeDiv);

  // Record button
  const recBtn = document.createElement('button');
  recBtn.id = 'recordBtn';
  recBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><circle cx="12" cy="12" r="7"/></svg>';
  recBtn.addEventListener('click', toggleRecord);
  bar.appendChild(recBtn);
})();

// --- CANVAS SETUP ---
const canvas = $('#drawCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  redraw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- HISTORY ---
function saveState() {
  historyIndex++;
  drawHistory = drawHistory.slice(0, historyIndex);
  drawHistory.push(JSON.parse(JSON.stringify(strokes)));
  updateUndoRedo();
}
function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    strokes = JSON.parse(JSON.stringify(drawHistory[historyIndex]));
    redraw();
    updateUndoRedo();
  }
}
function redo() {
  if (historyIndex < drawHistory.length - 1) {
    historyIndex++;
    strokes = JSON.parse(JSON.stringify(drawHistory[historyIndex]));
    redraw();
    updateUndoRedo();
  }
}
function updateUndoRedo() {
  $('#undoBtn').disabled = historyIndex <= 0;
  $('#redoBtn').disabled = historyIndex >= drawHistory.length - 1;
}
$('#undoBtn').addEventListener('click', undo);
$('#redoBtn').addEventListener('click', redo);
$('#clearBtn').addEventListener('click', () => {
  if (strokes.length === 0) return;
  strokes = [];
  saveState();
  redraw();
});

saveState(); // initial empty state

// --- DRAWING ---
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - panOffset.x, y: t.clientY - panOffset.y };
}

// Use touch events for maximum mobile compatibility
canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onEnd, { passive: false });
canvas.addEventListener('touchcancel', onEnd, { passive: false });
// Also mouse events for desktop
canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);

function onStart(e) {
  e.preventDefault();
  const pos = getPos(e);
  const raw = e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };

  if (currentTool === 'text') {
    const input = $('#textInput');
    input.style.left = raw.x + 'px';
    input.style.top = (raw.y - 40) + 'px';
    input.style.display = 'block';
    input.style.color = currentColor;
    input.value = '';
    setTimeout(() => input.focus(), 50);
    input.onkeydown = ev => {
      if (ev.key === 'Enter') {
        if (input.value.trim()) {
          strokes.push({ type: 'text', x: pos.x, y: pos.y, text: input.value, color: currentColor, size: 18 + currentStroke * 2 });
          saveState();
          redraw();
        }
        input.style.display = 'none';
        input.blur();
      }
    };
    return;
  }

  if (currentTool === 'eraser') {
    eraseAt(pos);
    return;
  }

  isDrawing = true;
  if (currentTool === 'pen') {
    currentPoints = [pos];
  } else {
    shapeStart = pos;
  }
}

function onMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getPos(e);

  if (currentTool === 'pen') {
    currentPoints.push(pos);
    redraw();
    drawPenStroke(currentPoints, currentColor, currentStroke);
  } else if (shapeStart) {
    redraw();
    drawShape(currentTool, shapeStart.x, shapeStart.y, pos.x, pos.y, currentColor, currentStroke);
  }
}

function onEnd(e) {
  if (!isDrawing) return;
  isDrawing = false;

  let pos;
  if (e.changedTouches) {
    pos = { x: e.changedTouches[0].clientX - panOffset.x, y: e.changedTouches[0].clientY - panOffset.y };
  } else {
    pos = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
  }

  if (currentTool === 'pen' && currentPoints.length > 1) {
    strokes.push({ type: 'pen', points: [...currentPoints], color: currentColor, width: currentStroke });
    saveState();
  } else if (shapeStart && currentTool !== 'pen') {
    strokes.push({ type: currentTool, x1: shapeStart.x, y1: shapeStart.y, x2: pos.x, y2: pos.y, color: currentColor, width: currentStroke });
    saveState();
  }
  currentPoints = [];
  shapeStart = null;
  redraw();
}

function eraseAt(pos) {
  const threshold = 20;
  for (let i = strokes.length - 1; i >= 0; i--) {
    const s = strokes[i];
    let hit = false;
    if (s.type === 'pen') {
      hit = s.points.some(p => Math.hypot(p.x - pos.x, p.y - pos.y) < threshold);
    } else if (s.type === 'text') {
      hit = Math.hypot(s.x - pos.x, s.y - pos.y) < 50;
    } else {
      const cx = (s.x1 + s.x2) / 2, cy = (s.y1 + s.y2) / 2;
      hit = Math.hypot(cx - pos.x, cy - pos.y) < Math.max(Math.abs(s.x2 - s.x1), Math.abs(s.y2 - s.y1)) / 2 + threshold;
    }
    if (hit) {
      strokes.splice(i, 1);
      saveState();
      redraw();
      return;
    }
  }
}

// --- RENDERING ---
function redraw() {
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.translate(panOffset.x, panOffset.y);
  strokes.forEach(s => {
    if (s.type === 'pen') drawPenStroke(s.points, s.color, s.width);
    else if (s.type === 'text') drawText(s);
    else drawShape(s.type, s.x1, s.y1, s.x2, s.y2, s.color, s.width);
  });
  ctx.restore();
}

function drawPenStroke(pts, color, width) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i + 1].x) / 2;
    const my = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  ctx.stroke();
}

function drawShape(type, x1, y1, x2, y2, color, width) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (type === 'rect') {
    ctx.beginPath(); ctx.rect(x1, y1, x2 - x1, y2 - y1); ctx.stroke();
  } else if (type === 'diamond') {
    const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
    ctx.beginPath();
    ctx.moveTo(cx, y1); ctx.lineTo(x2, cy); ctx.lineTo(cx, y2); ctx.lineTo(x1, cy);
    ctx.closePath(); ctx.stroke();
  } else if (type === 'ellipse') {
    const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
    const rx = Math.abs(x2 - x1) / 2, ry = Math.abs(y2 - y1) / 2;
    ctx.beginPath(); ctx.ellipse(cx, cy, Math.max(rx, 1), Math.max(ry, 1), 0, 0, Math.PI * 2); ctx.stroke();
  } else if (type === 'line') {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  } else if (type === 'arrow') {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLen = 14 + width * 2;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
    ctx.stroke();
  }
}

function drawText(s) {
  ctx.font = `500 ${s.size}px 'DM Sans', sans-serif`;
  ctx.fillStyle = s.color;
  ctx.fillText(s.text, s.x, s.y);
}

// --- CAMERA (tap to activate) ---
const cameraOff = $('#cameraOff');
const cameraVideo = $('#cameraVideo');

cameraOff.addEventListener('click', startCamera);
// Also try auto-start after a small delay (works on some browsers)
setTimeout(() => { if (!cameraReady) startCamera(); }, 500);

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 240 }, height: { ideal: 240 } },
      audio: false
    });
    cameraVideo.srcObject = stream;
    cameraOff.style.display = 'none';
    cameraReady = true;
  } catch (err) {
    console.warn('Camera:', err.message);
    cameraOff.querySelector('span').textContent = '无权限';
  }
}

// --- DRAGGABLE CAMERA PIP ---
(function () {
  const pip = $('#cameraPip');
  let dragging = false, startX, startY, origX, origY, moved = false;

  pip.addEventListener('touchstart', e => {
    if (e.target === cameraOff || e.target.parentElement === cameraOff) return;
    const t = e.touches[0];
    dragging = true; moved = false;
    startX = t.clientX; startY = t.clientY;
    const r = pip.getBoundingClientRect();
    origX = r.left; origY = r.top;
  }, { passive: true });

  pip.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
    pip.style.left = (origX + dx) + 'px';
    pip.style.top = (origY + dy) + 'px';
    pip.style.right = 'auto';
    pip.style.bottom = 'auto';
  }, { passive: false });

  pip.addEventListener('touchend', () => { dragging = false; });
})();

// --- SCREEN RECORDING ---
let mediaRecorder = null;
let recordedChunks = [];
let recordStartTime = 0;
let timerInterval = null;

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  try {
    const canvasStream = canvas.captureStream(30);
    let audioStream = null;
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) { /* no audio */ }

    const tracks = [...canvasStream.getTracks()];
    if (audioStream) tracks.push(...audioStream.getTracks());
    const stream = new MediaStream(tracks);

    // Find supported mime type
    const mimeTypes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
    let mimeType = '';
    for (const mt of mimeTypes) {
      if (MediaRecorder.isTypeSupported(mt)) { mimeType = mt; break; }
    }

    recordedChunks = [];
    const options = mimeType ? { mimeType } : {};
    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type: mimeType || 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'boardcam-' + Date.now() + '.' + ext;
      a.click();
      URL.revokeObjectURL(url);

      $('#recordBtn').classList.remove('recording');
      $('#recordTimer').classList.remove('visible');
      clearInterval(timerInterval);
      if (audioStream) audioStream.getTracks().forEach(t => t.stop());
    };

    mediaRecorder.start(200);
    $('#recordBtn').classList.add('recording');
    recordStartTime = Date.now();
    $('#recordTimer').classList.add('visible');
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      $('#timerText').textContent = m + ':' + s;
    }, 500);

    startCompositeLoop();
  } catch (err) {
    console.error('Recording failed:', err);
    alert('录屏功能暂不支持此浏览器，请使用 Chrome 浏览器。');
  }
}

let compositeRAF = null;
function startCompositeLoop() {
  const video = cameraVideo;
  const pip = $('#cameraPip');

  function loop() {
    if (!mediaRecorder || mediaRecorder.state !== 'recording') { compositeRAF = null; return; }
    redraw();

    if (cameraReady && video.readyState >= 2) {
      const pr = pip.getBoundingClientRect();
      const cx = pr.left + pr.width / 2;
      const cy = pr.top + pr.height / 2;
      const r = pr.width / 2;

      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.translate(cx + r, cy - r);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, r * 2, r * 2);
      ctx.restore();

      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }
    compositeRAF = requestAnimationFrame(loop);
  }
  loop();
}

// --- KEYBOARD SHORTCUTS ---
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'y') { e.preventDefault(); redo(); }
});
